<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Anderson Brito | Editor de Vídeo</title>
  <meta name="description" content="Portfolio de edição de vídeo: criativos, VSL, direct response. Vídeos que retêm, convertem e vendem.">
  <meta name="keywords" content="portfolio vídeo, criativos, VSL, direct response, edição profissional">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://andersonbrito.com/portfolio.html">
  <meta property="og:title" content="Portfolio — Anderson Brito | Editor de Vídeo">
  <meta property="og:description" content="Projetos em criativos, VSL e direct response. Vídeos que retêm, convertem e vendem.">
  <meta property="og:image" content="https://andersonbrito.com/assets/foto-perfil.jpg">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="canonical" href="https://andersonbrito.com/portfolio.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --pr-menubar:   #1C1C1C;
      --pr-toolbar:   #232325;
      --pr-panel-bg:  #1E1E22;
      --pr-panel-hd:  #28282E;
      --pr-card:      #26262C;
      --pr-border:    #000;
      --pr-sep:       #38383F;
      --accent:       #3DA7FF;
      --accent-2:     #0070D1;
      --accent-gr:    #22c55e;
      --orange:       #FF6B35;
      --purple:       #5A2D7A;
      --tx-hi:        #EAEAEF;
      --tx-mid:       #8888A0;
      --tx-lo:        #505060;
      --f-mono:       'IBM Plex Mono', monospace;
      --f-head:       'Exo 2', sans-serif;
      --f-body:       'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0A0A0C;
      color: var(--tx-hi);
      font-family: var(--f-body);
      font-size: 14px;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* LANG TOGGLE */
    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 2px;
      background: rgba(61,167,255,0.1);
      border: 1px solid rgba(61,167,255,0.2);
      border-radius: 3px;
      z-index: 100;
    }
    .lang-btn {
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--tx-mid);
      font-family: var(--f-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
    }
    .lang-btn.active {
      background: var(--accent);
      color: #000;
    }
    .lang-btn:hover:not(.active) {
      color: var(--accent);
    }

    /* PAGE HEADER */
    .header {
      background: #0A0A0C;
      padding: 60px 24px 40px;
      border-bottom: 1px solid var(--pr-sep);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 50% 100% at 50% 0%, rgba(61,167,255,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-content {
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
    }
    .h-label {
      font-family: var(--f-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .h-label::before { content: '//'; color: var(--tx-lo); }
    .h-title {
      font-family: var(--f-head);
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 900;
      font-style: italic;
      line-height: 1.05;
      margin-bottom: 12px;
    }
    .h-sub {
      font-size: 15px;
      color: var(--tx-mid);
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .h-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-n {
      font-family: var(--f-mono);
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
    }
    .stat-l {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--tx-lo);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* FILTER BAR */
    .filter-bar {
      background: var(--pr-panel-hd);
      border-bottom: 1px solid var(--pr-sep);
      position: sticky;
      top: 0;
      z-index: 90;
      padding: 16px 20px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--pr-card);
      border: 1px solid var(--pr-sep);
      border-radius: 3px;
      font-family: var(--f-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--tx-mid);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover { background: rgba(61,167,255,.15); color: var(--accent); border-color: var(--accent); }
    .filter-btn.active {
      background: var(--accent-2);
      color: #fff;
      border-color: var(--accent);
    }
    .filter-swatch {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .filter-count {
      font-size: 9px;
      background: rgba(255,255,255,.1);
      padding: 0px 5px;
      border-radius: 8px;
      color: var(--tx-lo);
    }

    /* GRID */
    .portfolio-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* VIDEO CARD */
    .video-card {
      background: var(--pr-card);
      border: 1px solid var(--pr-sep);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all .2s;
      cursor: pointer;
    }
    .video-card:hover {
      background: #30303A;
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(61,167,255,.1);
    }
    .video-card.hidden { display: none; }

    /* VIDEO CONTAINER */
    .video-wrapper {
      position: relative;
      overflow: hidden;
      background: #000;
    }
    .video-wrapper.vertical {
      aspect-ratio: 9/16;
    }
    .video-wrapper.horizontal {
      aspect-ratio: 16/9;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* CARD CONTENT */
    .card-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title {
      font-family: var(--f-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--tx-hi);
      flex: 1;
    }
    .card-cat {
      display: inline-block;
      padding: 3px 8px;
      background: rgba(61,167,255,.15);
      border: 1px solid rgba(61,167,255,.3);
      border-radius: 2px;
      font-family: var(--f-mono);
      font-size: 8px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-cat.criativo { background: rgba(43,82,128,.2); border-color: rgba(43,82,128,.4); color: #5BA3FF; }
    .card-cat.vsl { background: rgba(90,45,122,.2); border-color: rgba(90,45,122,.4); color: #D48EFF; }
    .card-cat.dr { background: rgba(255,107,53,.2); border-color: rgba(255,107,53,.4); color: #FF8A6B; }

    .card-desc {
      font-size: 12px;
      color: var(--tx-mid);
      line-height: 1.5;
    }
    .card-meta {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--tx-lo);
      padding-top: 10px;
      border-top: 1px solid var(--pr-sep);
      display: flex;
      gap: 16px;
      text-transform: uppercase;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--pr-panel-bg);
      border: 1px solid var(--pr-sep);
      border-radius: 8px;
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--pr-sep);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-family: var(--f-head);
      font-size: 16px;
      font-weight: 700;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255,255,255,.1);
      color: var(--tx-hi);
      border-radius: 3px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }
    .modal-close:hover { background: rgba(61,167,255,.2); color: var(--accent); }
    .modal-video {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
    }
    .modal-video iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .modal-footer {
      padding: 20px;
      border-top: 1px solid var(--pr-sep);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .modal-tag {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(61,167,255,.15);
      border: 1px solid rgba(61,167,255,.3);
      border-radius: 3px;
      font-family: var(--f-mono);
      font-size: 9px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @media (max-width: 768px) {
      .header { padding: 40px 20px 30px; }
      .h-title { font-size: 32px; }
      .h-stats { gap: 24px; }
      .video-grid { grid-template-columns: 1fr; }
      .filter-bar { padding: 12px; }
      .lang-toggle { top: 10px; right: 10px; }
    }
  </style>
</head>
<body>

  <!-- LANGUAGE TOGGLE -->
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="pt" onclick="setLanguage('pt')">PT</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-content">
      <div class="h-label" data-pt="// CRIATIVOS · VSL · DIRECT RESPONSE" data-en="// CREATIVES · VSL · DIRECT RESPONSE"></div>
      <h1 class="h-title" data-pt="Portfolio de Vídeo" data-en="Video Portfolio"></h1>
      <p class="h-sub" data-pt="Projetos focados em retenção, conversão e vendas. Criativos, VSL e Direct Response testados em campanhas reais." data-en="Projects focused on retention, conversion, and sales. Creatives, VSLs and Direct Response tested in real campaigns."></p>
      <div class="h-stats">
        <div class="stat-item">
          <div class="stat-n" id="totalVideos">12</div>
          <div class="stat-l" data-pt="VÍDEOS" data-en="VIDEOS"></div>
        </div>
        <div class="stat-item">
          <div class="stat-n" data-pt="50+" data-en="50+"></div>
          <div class="stat-l" data-pt="PROJETOS" data-en="PROJECTS"></div>
        </div>
        <div class="stat-item">
          <div class="stat-n" data-pt="100%" data-en="100%"></div>
          <div class="stat-l" data-pt="PERFORMANCE" data-en="PERFORMANCE"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="filterVideos('all')">
      <span data-pt="Todos" data-en="All"></span>
      <span class="filter-count" id="count-all">12</span>
    </button>
    <button class="filter-btn" data-filter="criativo" onclick="filterVideos('criativo')">
      <div class="filter-swatch" style="background: #2B5280;"></div>
      <span data-pt="Criativo" data-en="Creative"></span>
      <span class="filter-count" id="count-criativo">4</span>
    </button>
    <button class="filter-btn" data-filter="vsl" onclick="filterVideos('vsl')">
      <div class="filter-swatch" style="background: #5A2D7A;"></div>
      <span data-pt="VSL" data-en="VSL"></span>
      <span class="filter-count" id="count-vsl">4</span>
    </button>
    <button class="filter-btn" data-filter="dr" onclick="filterVideos('dr')">
      <div class="filter-swatch" style="background: #FF6B35;"></div>
      <span data-pt="Direct Response" data-en="Direct Response"></span>
      <span class="filter-count" id="count-dr">4</span>
    </button>
  </div>

  <!-- PORTFOLIO GRID -->
  <div class="portfolio-main">
    <div class="video-grid" id="videoGrid"></div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-video" id="modalVideo">
        <iframe id="modalIframe" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // VIDEO DATABASE
    // ════════════════════════════════════════════
    const VIDEOS = [
      // CRIATIVOS
      {
        id: 1,
        titlePt: 'Short Criativo #01',
        titleEn: 'Creative Short #01',
        category: 'criativo',
        format: 'vertical',
        descPt: 'Criativo de 15s com hook viral e padrão de cortes rápidos.',
        descEn: '15-second creative with viral hook and fast-cut editing pattern.',
        videoUrl: 'https://www.youtube.com/embed/mrk7y-do9AA'
      },
      {
        id: 2,
        titlePt: 'Short Criativo #02',
        titleEn: 'Creative Short #02',
        category: 'criativo',
        format: 'vertical',
        descPt: 'Padrão de edição com transições rápidas e power words.',
        descEn: 'Editing pattern with fast transitions and power words.',
        videoUrl: 'https://www.youtube.com/embed/cOftoraPrjE'
      },
      {
        id: 3,
        titlePt: 'Short Criativo #03',
        titleEn: 'Creative Short #03',
        category: 'criativo',
        format: 'vertical',
        descPt: 'Criativo com movimento e pattern interrupt para retenção máxima.',
        descEn: 'Creative with movement and pattern interrupt for maximum retention.',
        videoUrl: 'https://www.youtube.com/embed/U0nkvS7UgX8'
      },
      {
        id: 4,
        titlePt: 'Short Criativo #04',
        titleEn: 'Creative Short #04',
        category: 'criativo',
        format: 'vertical',
        descPt: 'Formato nativo para Reels com copy visual impactante.',
        descEn: 'Native format for Reels with impactful visual copy.',
        videoUrl: 'https://www.youtube.com/embed/vmr2n1r1AAQ'
      },

      // VSL
      {
        id: 5,
        titlePt: 'VSL de Vendas — Full',
        titleEn: 'Sales VSL — Full',
        category: 'vsl',
        format: 'horizontal',
        descPt: 'Video Sales Letter completo: hook, problema, solução, CTA e oferta bônus.',
        descEn: 'Complete Video Sales Letter: hook, problem, solution, CTA and bonus offer.',
        videoUrl: 'https://vimeo.com/1047582530'
      },
      {
        id: 6,
        titlePt: 'Short VSL #01',
        titleEn: 'Short VSL #01',
        category: 'vsl',
        format: 'vertical',
        descPt: 'VSL curta focada em retenção e conversão em cold traffic.',
        descEn: 'Short VSL focused on retention and conversion on cold traffic.',
        videoUrl: 'https://www.youtube.com/embed/BH3zYlYnjJA'
      },

      // DIRECT RESPONSE
      {
        id: 7,
        titlePt: 'Video de Apresentação',
        titleEn: 'Presentation Video',
        category: 'dr',
        format: 'horizontal',
        descPt: 'Vídeo horizontal de apresentação com estrutura de storytelling e CTA direto.',
        descEn: 'Horizontal presentation video with storytelling structure and direct CTA.',
        videoUrl: 'https://www.youtube.com/embed/6ANWvn9R2yY'
      },
      {
        id: 8,
        titlePt: 'DR Short #01',
        titleEn: 'DR Short #01',
        category: 'dr',
        format: 'vertical',
        descPt: 'Direct Response em formato Shorts com oferta clara e urgência real.',
        descEn: 'Direct Response in Shorts format with clear offer and real urgency.',
        videoUrl: 'https://www.youtube.com/embed/cOftoraPrjE'
      },
    ];

    let currentLang = localStorage.getItem('portfolio-lang') || 'pt';

    // ════════════════════════════════════════════
    // LANGUAGE SYSTEM
    // ════════════════════════════════════════════
    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('portfolio-lang', lang);

      document.querySelectorAll('[data-pt][data-en]').forEach(el => {
        const text = lang === 'pt' ? el.getAttribute('data-pt') : el.getAttribute('data-en');
        if (el.tagName === 'SPAN' || el.tagName === 'P' || el.tagName === 'DIV' && !el.querySelector('[data-pt]')) {
          el.textContent = text;
        }
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });

      // Re-render videos with new language
      renderVideos(document.querySelector('.filter-btn.active')?.getAttribute('data-filter') || 'all');
    }

    // ════════════════════════════════════════════
    // RENDER VIDEOS
    // ════════════════════════════════════════════
    function renderVideos(filter) {
      const grid = document.getElementById('videoGrid');
      const filtered = filter === 'all' ? VIDEOS : VIDEOS.filter(v => v.category === filter);

      grid.innerHTML = '';

      filtered.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = `video-card`;
        card.dataset.filter = v.category;
        card.style.animationDelay = (i * 0.06) + 's';

        const title = currentLang === 'pt' ? v.titlePt : v.titleEn;
        const desc = currentLang === 'pt' ? v.descPt : v.descEn;

        const catColors = {
          criativo: { bg: '#2B5280', text: '#5BA3FF' },
          vsl: { bg: '#5A2D7A', text: '#D48EFF' },
          dr: { bg: '#FF6B35', text: '#FFB399' }
        };

        const catLabel = {
          criativo: currentLang === 'pt' ? 'Criativo' : 'Creative',
          vsl: 'VSL',
          dr: 'Direct Response'
        };

        card.innerHTML = `
          <div class="video-wrapper ${v.format}">
            <iframe src="${v.videoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div class="card-content">
            <div class="card-header">
              <div class="card-title">${title}</div>
              <div class="card-cat ${v.category}" style="background: rgba(${hexToRgb(catColors[v.category].bg)}, 0.2); color: ${catColors[v.category].text}; border-color: rgba(${hexToRgb(catColors[v.category].bg)}, 0.4);">
                ${catLabel[v.category]}
              </div>
            </div>
            <div class="card-desc">${desc}</div>
            <div class="card-meta">
              <span>${v.format === 'vertical' ? '9:16' : '16:9'}</span>
              <span>${currentLang === 'pt' ? 'YouTube/Vimeo' : 'YouTube/Vimeo'}</span>
            </div>
          </div>
        `;

        card.addEventListener('click', () => openModal(v));
        grid.appendChild(card);
      });

      updateCounts();
    }

    // ════════════════════════════════════════════
    // FILTER
    // ════════════════════════════════════════════
    function filterVideos(filter) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.filter-btn').classList.add('active');
      renderVideos(filter);
    }

    // ════════════════════════════════════════════
    // MODAL
    // ════════════════════════════════════════════
    function openModal(v) {
      const title = currentLang === 'pt' ? v.titlePt : v.titleEn;
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalIframe').src = v.videoUrl + '?autoplay=1';

      const catLabel = {
        criativo: currentLang === 'pt' ? 'Criativo' : 'Creative',
        vsl: 'VSL',
        dr: 'Direct Response'
      };

      document.getElementById('modalFooter').innerHTML =
        `<span class="modal-tag">${catLabel[v.category]}</span>
         <span class="modal-tag">${v.format === 'vertical' ? '9:16' : '16:9'}</span>`;

      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('modalIframe').src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // ════════════════════════════════════════════
    // COUNTS
    // ════════════════════════════════════════════
    function updateCounts() {
      document.getElementById('count-all').textContent = VIDEOS.length;
      document.getElementById('count-criativo').textContent = VIDEOS.filter(v => v.category === 'criativo').length;
      document.getElementById('count-vsl').textContent = VIDEOS.filter(v => v.category === 'vsl').length;
      document.getElementById('count-dr').textContent = VIDEOS.filter(v => v.category === 'dr').length;
      document.getElementById('totalVideos').textContent = VIDEOS.length;
    }

    // ════════════════════════════════════════════
    // UTILS
    // ════════════════════════════════════════════
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `${parseInt(result[1], 16)},${parseInt(result[2], 16)},${parseInt(result[3], 16)}` : '0,0,0';
    }

    // ════════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      setLanguage(currentLang);
    });
  </script>

</body>
</html>
