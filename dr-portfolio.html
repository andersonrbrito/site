  <style>
    :root {
      --pr-menubar:     #1C1C1C;
      --pr-toolbar:     #232325;
      --pr-panel-bg:    #1E1E22;
      --pr-panel-hd:    #28282E;
      --pr-card:        #26262C;
      --pr-border:      #000;
      --pr-sep:         #38383F;
      --accent:         #3DA7FF;
      --accent-2:       #0070D1;
      --accent-gr:      #22c55e;
      --orange:         #FF6B35;
      --tx-hi:          #EAEAEF;
      --tx-mid:         #8888A0;
      --tx-lo:          #505060;
      --f-mono:         'IBM Plex Mono', monospace;
      --f-head:         'Exo 2', sans-serif;
      --f-body:         'DM Sans', sans-serif;
    }

    /* LANGUAGE TOGGLE */
    .lang-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 2px;
      background: rgba(61,167,255,0.1);
      border: 1px solid rgba(61,167,255,0.2);
      border-radius: 3px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--tx-mid);
      font-family: var(--f-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
    }
    .lang-btn.active {
      background: var(--accent);
      color: #000;
    }
    .lang-btn:hover:not(.active) {
      color: var(--accent);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0A0A0C;
      color: var(--tx-hi);
      font-family: var(--f-body);
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }

    /* HEADER */
    .header {
      background: var(--pr-menubar);
      border-bottom: 1px solid var(--pr-sep);
      padding: 40px 20px;
      text-align: center;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(61,167,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-content { position: relative; max-width: 720px; margin: 0 auto; }
    .header-label {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .header-title {
      font-family: var(--f-head);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      font-style: italic;
      margin-bottom: 12px;
      line-height: 1.05;
    }
    .header-sub {
      font-size: 15px;
      color: var(--tx-mid);
      margin-bottom: 28px;
      line-height: 1.7;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 4px;
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--accent-gr);
      letter-spacing: 0.05em;
    }

    /* FILTER */
    .filter-bar {
      background: var(--pr-panel-bg);
      border-bottom: 1px solid var(--pr-sep);
      padding: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .filter-btn {
      padding: 8px 16px;
      background: var(--pr-card);
      border: 1px solid var(--pr-sep);
      border-radius: 3px;
      color: var(--tx-mid);
      font-family: var(--f-head);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent-2);
      color: #fff;
      border-color: var(--accent);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--pr-border);
      border: 1px solid var(--pr-border);
      margin: 40px 20px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    .video-card {
      background: var(--pr-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background .2s;
    }
    .video-card:hover { background: var(--pr-panel-hd); }
    .video-card.hidden { display: none; }

    /* VIDEO CONTAINER */
    .video-container {
      width: 100%;
      padding-top: 56.25%;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* CARD CONTENT */
    .card-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title {
      font-family: var(--f-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--tx-hi);
      flex: 1;
    }
    .card-type {
      display: inline-block;
      padding: 4px 8px;
      background: rgba(61,167,255,0.1);
      border: 1px solid rgba(61,167,255,0.2);
      border-radius: 2px;
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-type.dr { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.2); color: var(--orange); }
    .card-type.ctr { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.2); color: var(--accent-gr); }
    .card-type.vsl { background: rgba(61,167,255,0.1); border-color: rgba(61,167,255,0.2); color: var(--accent); }

    .card-desc {
      font-size: 12px;
      color: var(--tx-mid);
      line-height: 1.5;
    }
    .card-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--pr-sep);
    }
    .metric {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .metric-label {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--tx-lo);
      text-transform: uppercase;
    }
    .metric-value {
      font-family: var(--f-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-gr);
    }

    /* FOOTER */
    .footer {
      background: var(--pr-menubar);
      border-top: 1px solid var(--pr-sep);
      padding: 40px 20px;
      text-align: center;
    }
    .footer-content { max-width: 720px; margin: 0 auto; }
    .footer-label {

      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);

      font-size: 32px;

      letter-spacing: 0.06em;

    }

    @media (max-width: 720px) {

      .filter-bar { padding: 12px; gap: 8px; }
      .card-metrics { grid-template-columns: 1fr; }
      .header { padding: 28px 16px; }
      .footer { padding: 28px 16px; }

  <script>
    // Language system
    let currentLang = localStorage.getItem('dr-portfolio-lang') || 'pt';

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('dr-portfolio-lang', lang);

      // Update all elements with data attributes
      document.querySelectorAll('[data-pt][data-en]').forEach(el => {
        const text = lang === 'pt' ? el.getAttribute('data-pt') : el.getAttribute('data-en');

        // For header/footer labels that don't contain text nodes
        if (el.tagName === 'DIV' && el.className === 'header-label') {
          el.textContent = text;
        } else if (el.tagName === 'DIV' && el.className === 'footer-label') {
          el.textContent = text;
        } else if (el.tagName === 'SPAN' && el.getAttribute('data-pt')) {
          el.textContent = text;
        } else if (el.tagName === 'BUTTON' && el.className.includes('filter-btn')) {
          el.textContent = text;
        } else if (el.tagName === 'H1' || el.tagName === 'H2') {
          el.textContent = text;
        } else if (el.tagName === 'P') {
          el.textContent = text;
        } else if (el.tagName === 'DIV' && el.className.includes('card-title')) {
          el.textContent = text;
        } else if (el.tagName === 'DIV' && el.className.includes('card-desc')) {
          el.textContent = text;
        } else if (el.tagName === 'SPAN' && el.className.includes('metric-label')) {
          el.textContent = text;
        }
      });

      // Update button styles
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-lang') === lang) {
          btn.classList.add('active');
        }
      });
    }

    function filterVideos(type) {
      const cards = document.querySelectorAll('.video-card');
      const buttons = document.querySelectorAll('.filter-btn');

      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      cards.forEach(card => {
        if (type === 'all' || card.dataset.type === type) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }

    // Initialize language on page load
    document.addEventListener('DOMContentLoaded', function() {
      setLanguage(currentLang);
    });
  </script>

</body>
</html>
