<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DA7FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070D1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#1E1E22"/>

  <!-- Play button (film/video metaphor) -->
  <polygon points="18,14 18,34 34,24" fill="url(#logoGradient)" opacity="0.9"/>

  <!-- Camera aperture rings (photography metaphor) -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="url(#logoGradient)" stroke-width="0.8" opacity="0.4"/>
  <circle cx="24" cy="24" r="15" fill="none" stroke="url(#logoGradient)" stroke-width="0.8" opacity="0.3"/>

  <!-- Accent corners (Premiere Pro style) -->
  <rect x="4" y="4" width="2.5" height="2.5" fill="url(#logoGradient)"/>
  <rect x="41.5" y="4" width="2.5" height="2.5" fill="url(#logoGradient)"/>
  <rect x="4" y="41.5" width="2.5" height="2.5" fill="url(#logoGradient)"/>
  <rect x="41.5" y="41.5" width="2.5" height="2.5" fill="url(#logoGradient)"/>
</svg>
