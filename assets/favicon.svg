<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#1E1E22"/>

  <!-- Accent border -->
  <rect width="64" height="64" fill="none" stroke="#3DA7FF" stroke-width="1.5"/>

  <!-- AB Initials -->
  <text x="32" y="40" font-family="IBM Plex Mono, monospace" font-size="24" font-weight="600" fill="#3DA7FF" text-anchor="middle" letter-spacing="0.5">AB</text>

  <!-- Minimal top accent line -->
  <rect x="8" y="8" width="48" height="1" fill="#3DA7FF" opacity="0.6"/>
</svg>
