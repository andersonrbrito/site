<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DA7FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070D1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background (Premiere Pro dark) -->
  <rect width="64" height="64" fill="#1E1E22"/>

  <!-- Corner accents (film strip style) -->
  <rect x="2" y="2" width="4" height="4" fill="#3DA7FF"/>
  <rect x="58" y="2" width="4" height="4" fill="#3DA7FF"/>
  <rect x="2" y="58" width="4" height="4" fill="#3DA7FF"/>
  <rect x="58" y="58" width="4" height="4" fill="#3DA7FF"/>

  <!-- Main accent border -->
  <rect x="6" y="6" width="52" height="52" fill="none" stroke="url(#grad1)" stroke-width="1.5"/>

  <!-- Play button icon (subtle) -->
  <polygon points="28,20 28,44 42,32" fill="#3DA7FF" opacity="0.4"/>

  <!-- AB Initials -->
  <text x="32" y="38" font-family="IBM Plex Mono, monospace" font-size="18" font-weight="700" fill="#3DA7FF" text-anchor="middle" letter-spacing="1">AB</text>

  <!-- Bottom accent line -->
  <rect x="8" y="56" width="48" height="0.5" fill="#3DA7FF" opacity="0.7"/>
</svg>
